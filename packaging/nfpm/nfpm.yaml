# nfpm config — builds the Speculum .deb AND .rpm from the Compose app-image.
#
# jpackage's installer can't add a /usr/bin symlink or run post-install logic
# (it only drops files under /opt/<name>), so the executable wasn't on PATH and
# the systemd unit had to be copied by hand. nfpm wraps the same app-image the
# Arch PKGBUILD uses (`:composeApp:createDistributable`) and adds the symlink,
# the systemd unit at the proper path, and maintainer scripts.
#
# Build (from the repo root, after createDistributable + the web build):
#   PKG_VERSION=1.2.3 PKG_ARCH=arm64 \
#     nfpm pkg --config packaging/nfpm/nfpm.yaml --packager deb --target dist/speculum.deb
#   PKG_VERSION=1.2.3 PKG_ARCH=arm64 \
#     nfpm pkg --config packaging/nfpm/nfpm.yaml --packager rpm --target dist/speculum.rpm
#
# PKG_ARCH is the Debian arch (arm64 / amd64); nfpm maps it to the rpm arch
# (aarch64 / x86_64) automatically. Paths are relative to the repo root.

name: speculum
arch: ${PKG_ARCH}
version: ${PKG_VERSION}
maintainer: Pierre Jochem <pierrejochem@msn.com>
description: Speculum — modular smart-mirror dashboard
vendor: Speculum
homepage: https://github.com/pierrejochem/Speculum
license: MIT

# Runtime X/render libs Skiko needs (the JRE itself is bundled in the app-image).
depends:
  - fontconfig
overrides:
  rpm:
    depends:
      - fontconfig
      - freetype
      - libX11
      - libXext
      - libXrender
      - libXtst
      - libXi
  deb:
    depends:
      - libfontconfig1
      - libfreetype6
      - libx11-6
      - libxext6
      - libxrender1
      - libxtst6
      - libxi6

contents:
  # The self-contained app-image (launcher + bundled JRE + plugins + web admin).
  - src: composeApp/build/compose/binaries/main/app/speculum/
    dst: /opt/speculum

  # Put the launcher on PATH (jpackage never did this for deb/rpm).
  - src: /opt/speculum/bin/speculum
    dst: /usr/bin/speculum
    type: symlink

  # Desktop-session kiosk helpers. `speculum-kiosk-enable` installs a per-user
  # XDG autostart entry that launches the mirror fullscreen via the run wrapper
  # (which also disables blanking + hides the cursor); `-disable` removes it.
  - src: packaging/scripts/speculum-kiosk-run
    dst: /opt/speculum/libexec/speculum-kiosk-run
    file_info:
      mode: 0755
  - src: packaging/scripts/speculum-kiosk-enable
    dst: /opt/speculum/libexec/speculum-kiosk-enable
    file_info:
      mode: 0755
  - src: packaging/scripts/speculum-kiosk-disable
    dst: /opt/speculum/libexec/speculum-kiosk-disable
    file_info:
      mode: 0755
  - src: /opt/speculum/libexec/speculum-kiosk-enable
    dst: /usr/bin/speculum-kiosk-enable
    type: symlink
  - src: /opt/speculum/libexec/speculum-kiosk-disable
    dst: /usr/bin/speculum-kiosk-disable
    type: symlink

  - src: packaging/arch/speculum.desktop
    dst: /usr/share/applications/speculum.desktop

  - src: composeApp/icons/speculum.png
    dst: /usr/share/icons/hicolor/512x512/apps/speculum.png

  # In-app one-click updater. The root oneshot unit installs a staged, verified
  # package; the polkit rule lets any active local session start that one unit;
  # the helper is the privileged install script; KEYS is the pinned signing key
  # the helper verifies releases against (root-owned, not user-writable).
  - src: packaging/systemd/speculum-update.service
    dst: /usr/lib/systemd/system/speculum-update.service
  - src: packaging/polkit/org.speculum.update.rules
    dst: /usr/share/polkit-1/rules.d/org.speculum.update.rules
  - src: packaging/scripts/speculum-apply-update
    dst: /opt/speculum/libexec/speculum-apply-update
    file_info:
      mode: 0755
  - src: KEYS
    dst: /opt/speculum/share/speculum-signing-key.asc

scripts:
  postinstall: packaging/nfpm/postinstall.sh
  postremove: packaging/nfpm/postremove.sh