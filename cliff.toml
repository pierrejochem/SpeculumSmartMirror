# git-cliff configuration — changelog from Conventional Commits.
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
This file is generated from [Conventional Commits](https://www.conventionalcommits.org).
"""
# Tera template. One section per release, grouped by commit type.
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}\
{% if commit.breaking %} **[breaking]**{% endif %}
{% endfor %}\
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
# Drop merge commits and anything that isn't a conventional commit.
filter_unconventional = true
filter_commits = true
split_commits = false
protect_breaking_commits = true
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"

# Order = order of first match. `skip` removes the commit from the changelog.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^style", group = "<!-- 5 -->Styling" },
  { message = "^test", group = "<!-- 6 -->Testing" },
  { message = "^revert", group = "<!-- 7 -->Reverts" },
  # Noise — never shown.
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^bump ", skip = true },
  { author = "dependabot[bot]", skip = true },
  # Anything else conventional but untyped above.
  { message = ".*", group = "<!-- 8 -->Other" },
]
