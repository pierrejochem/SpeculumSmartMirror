<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Speculum — social preview</title>
<defs>
  <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#7B61FF"/>
    <stop offset="1" stop-color="#3DD4C8"/>
  </linearGradient>
  <radialGradient id="glowV" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                  gradientTransform="translate(120 40) scale(620)">
    <stop offset="0" stop-color="#7B61FF" stop-opacity="0.28"/>
    <stop offset="1" stop-color="#7B61FF" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowT" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                  gradientTransform="translate(1240 0) scale(640)">
    <stop offset="0" stop-color="#3DD4C8" stop-opacity="0.20"/>
    <stop offset="1" stop-color="#3DD4C8" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="diamondClip"><path d="M120 30 L210 120 L120 210 L30 120 Z"/></clipPath>
</defs>

<!-- backdrop -->
<rect width="1280" height="640" fill="#0a0c10"/>
<rect width="1280" height="640" fill="url(#glowV)"/>
<rect width="1280" height="640" fill="url(#glowT)"/>

<!-- faint decorative diamonds, bottom-right -->
<g stroke="#7B61FF" stroke-opacity="0.10" fill="none" stroke-width="2">
  <path d="M1060 470 L1140 550 L1060 630 L980 550 Z"/>
  <path d="M1180 430 L1240 490 L1180 550 L1120 490 Z"/>
</g>

<!-- diamond glass mark (240-unit icon scaled ~1.45 → ~348px) -->
<g transform="translate(150 146) scale(1.45)">
  <g clip-path="url(#diamondClip)">
    <rect x="30" y="30" width="180" height="180" fill="url(#glass)"/>
    <rect x="30" y="30" width="90" height="180" fill="#000" opacity="0.14"/>
    <path d="M48 75 L108 75 L168 165 L108 165 Z" fill="#fff" opacity="0.22"/>
    <path d="M60 105 L87 105 L123 150 L96 150 Z" fill="#fff" opacity="0.18"/>
  </g>
  <path d="M120 30 L210 120 L120 210 L30 120 Z" fill="none" stroke="#7B61FF" stroke-width="3" opacity="0.5"/>
  <line x1="120" y1="30" x2="120" y2="210" stroke="#fff" stroke-width="2.5" opacity="0.45"/>
</g>

<!-- wordmark -->
<text x="560" y="296" font-family="Georgia, 'Times New Roman', serif" font-size="120"
      letter-spacing="2" fill="#e9ecf1">Specul<tspan fill="#9B86FF">u</tspan>m</text>

<!-- tagline -->
<text x="563" y="350" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="24"
      letter-spacing="11" fill="#8b939f">SMART MIRROR · KOTLIN</text>

<!-- descriptor -->
<text x="563" y="420" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="29" fill="#c4cad3">Modular smart-mirror dashboard —</text>
<text x="563" y="458" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="29" fill="#c4cad3">Compose for Desktop.</text>

<!-- footer strip -->
<rect x="563" y="520" width="320" height="3" rx="1.5" fill="url(#glass)" opacity="0.7"/>
<text x="563" y="566" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="20"
      letter-spacing="1.5" fill="#5d6573">github.com/pierrejochem/Speculum  ·  MIT</text>
</svg>