name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  deb-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: config-server/web/package-lock.json

      - name: Build web admin UI
        working-directory: config-server/web
        run: |
          npm ci
          npm run build

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Build arm64 .deb (jpackage on arm64)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD":/src -w /src eclipse-temurin:17-jdk bash -c "
              apt-get update -qq &&
              apt-get install -y -qq fakeroot binutils dpkg >/dev/null &&
              ./gradlew packageDeb --no-daemon --stacktrace
            "

      - name: Locate artifact
        id: deb
        run: echo "path=$(ls composeApp/build/compose/binaries/main/deb/*.deb | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: magicmirror-deb-arm64
          path: ${{ steps.deb.outputs.path }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.deb.outputs.path }}
          generate_release_notes: true

  publish-mirror-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # GITHUB_REPOSITORY (owner/repo) and the GITHUB_TOKEN are provided by
      # Actions; the build reads them to target maven.pkg.github.com.
      - name: Publish mirror-api to GitHub Packages
        run: ./gradlew :mirror-api:publish -PreleaseVersion="${GITHUB_REF_NAME}" --no-daemon --stacktrace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  arch-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      # Compose has no Arch target, so the PKGBUILD installs the app-image
      # (createDistributable). makepkg must run as a non-root user. pkgver is
      # pinned to the triggering tag so the PKGBUILD's source tarball matches.
      - name: Build Arch package (aarch64)
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD":/src -w /src \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            menci/archlinuxarm:base-devel bash -c '
              set -e
              pacman -Syu --noconfirm --needed base-devel sudo jdk17-openjdk nodejs npm git
              useradd -m builder
              printf "builder ALL=(ALL) NOPASSWD: ALL\n" > /etc/sudoers.d/builder
              chown -R builder /src
              sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" packaging/arch/PKGBUILD
              cd packaging/arch
              sudo -u builder makepkg -f --noconfirm
            '

      - name: Locate artifact
        id: pkg
        run: echo "path=$(ls packaging/arch/*.pkg.tar.zst | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: speculum-arch-aarch64
          path: ${{ steps.pkg.outputs.path }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.pkg.outputs.path }}
