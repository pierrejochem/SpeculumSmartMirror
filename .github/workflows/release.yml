name: Release

on:
  push:
    tags: ["v*"]
  # Manual / programmatic build of an existing tag. `prepare-release.yml`
  # dispatches this after it computes the version and pushes the tag (a
  # GITHUB_TOKEN tag push does not itself trigger the `push` event above).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to build & release (e.g. v0.4.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Resolve the version once: the dispatch input when run manually, else the
  # pushed tag. Done in a step (not workflow-level env, which can't read the
  # `inputs` context) and shared via outputs so every job builds the same tag.
  version:
    runs-on: ubuntu-latest
    outputs:
      v: ${{ steps.resolve.outputs.v }}
    steps:
      - id: resolve
        run: echo "v=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

  # .deb + .rpm for both arches. Build the Compose app-image with jpackage
  # (`createDistributable`) — which can't cross-compile, so each arch runs on its
  # own native runner (free for public repos, no QEMU) — then wrap it with nfpm.
  # nfpm (not jpackage's installer) gives the /usr/bin symlink, the systemd unit
  # at /usr/lib/systemd, and the postinstall/postremove scripts.
  linux-deb-rpm:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: arm64, runner: ubuntu-24.04-arm }
          - { arch: amd64, runner: ubuntu-latest }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.v }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: config-server/web/package-lock.json

      - name: Build web admin UI
        working-directory: config-server/web
        run: |
          npm ci
          npm run build

      # Build the self-contained app-image (launcher + bundled JRE + plugins +
      # web admin). createDistributable also runs prepareAppResources, which
      # bundles the module JARs and the web UI built above.
      - name: Build app-image (${{ matrix.arch }})
        run: |
          docker run --rm -v "$PWD":/src -w /src eclipse-temurin:17-jdk bash -c "
            ./gradlew :composeApp:createDistributable --no-daemon --stacktrace
          "

      # nfpm turns the one app-image into both a .deb and a .rpm, adding the
      # /usr/bin symlink, systemd unit and maintainer scripts (see
      # packaging/nfpm/nfpm.yaml). PKG_ARCH is the Debian arch; nfpm maps it to
      # the rpm arch automatically.
      - name: Install nfpm
        env:
          NFPM_VERSION: "2.43.0"
        run: |
          case "${{ matrix.arch }}" in
            arm64) NFPM_ARCH=arm64 ;;
            amd64) NFPM_ARCH=x86_64 ;;
          esac
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_${NFPM_ARCH}.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm

      - name: Package .deb + .rpm (${{ matrix.arch }})
        env:
          PKG_ARCH: ${{ matrix.arch }}
          PKG_VERSION: ${{ needs.version.outputs.v }}
        run: |
          export PKG_VERSION="${PKG_VERSION#v}"   # strip leading "v" from the tag
          mkdir -p dist
          nfpm pkg --config packaging/nfpm/nfpm.yaml --packager deb --target "dist/speculum_${PKG_VERSION}_${PKG_ARCH}.deb"
          nfpm pkg --config packaging/nfpm/nfpm.yaml --packager rpm --target "dist/speculum_${PKG_VERSION}_${PKG_ARCH}.rpm"

      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: speculum-linux-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.rpm

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.v }}
          files: |
            dist/*.deb
            dist/*.rpm

  # Release notes from Conventional Commits (git-cliff, see cliff.toml). Sets the
  # Release body; the package jobs only attach files, so they never overwrite it.
  changelog:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.v }}
          fetch-depth: 0  # full history + tags for the changelog

      - name: Generate release notes for this tag
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip all  # just this tag's section, no header/footer

      - name: Set the Release body
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.v }}
          body_path: ${{ steps.cliff.outputs.changelog }}

  # Arch package for both arches (the PKGBUILD installs the app-image).
  arch:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: aarch64, runner: ubuntu-24.04-arm, image: "menci/archlinuxarm:base-devel" }
          - { arch: x86_64, runner: ubuntu-latest, image: "archlinux:base-devel" }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.v }}

      # makepkg must run as a non-root user. pkgver is pinned to the released
      # version so the PKGBUILD's source tarball matches.
      # Use a custom var, NOT the built-in GITHUB_REF_NAME: a step-level env can't
      # override that reserved name, so on workflow_dispatch it stays the branch
      # ("main") and pkgver would become "main".
      - name: Build Arch package (${{ matrix.arch }})
        env:
          RELEASE_VERSION: ${{ needs.version.outputs.v }}
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            -e RELEASE_VERSION="${RELEASE_VERSION}" \
            ${{ matrix.image }} bash -c '
              set -e
              # systemd-detect-virt is flaky in containers; stub it so pacman
              # hooks never abort the install.
              ln -sf /usr/bin/true /usr/bin/systemd-detect-virt
              # pacman 7 download sandbox (Landlock + the alpm user) cannot
              # initialize inside an unprivileged container, so disable it.
              sed -i "s/^\[options\]/[options]\nDisableSandbox/" /etc/pacman.conf
              pacman -Syu --noconfirm --needed base-devel sudo jdk17-openjdk nodejs npm git
              useradd -m builder
              printf "builder ALL=(ALL) NOPASSWD: ALL\n" > /etc/sudoers.d/builder
              chown -R builder /src
              sed -i "s/^pkgver=.*/pkgver=${RELEASE_VERSION#v}/" packaging/arch/PKGBUILD
              cd packaging/arch
              # -s installs the PKGBUILD depends/makedepends via pacman (builder
              # has passwordless sudo), so runtime libs resolve during the build.
              sudo -u builder makepkg -s -f --noconfirm
            '

      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: speculum-arch-${{ matrix.arch }}
          # makepkg's PKGEXT differs by distro (.zst vs .xz), so match any.
          path: packaging/arch/*.pkg.tar.*

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.v }}
          files: packaging/arch/*.pkg.tar.*

  publish-mirror-api:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.v }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # GITHUB_REPOSITORY (owner/repo) and the GITHUB_TOKEN are provided by
      # Actions; the build reads them to target maven.pkg.github.com.
      - name: Publish mirror-api to GitHub Packages
        run: ./gradlew :mirror-api:publish -PreleaseVersion="${VERSION}" --no-daemon --stacktrace
        env:
          VERSION: ${{ needs.version.outputs.v }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  # SHA256SUMS over every package, plus detached GPG signatures when a signing
  # key is configured. Runs after the package jobs so all artifacts exist.
  checksums:
    needs: [version, linux-deb-rpm, arch]
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      # Signing is MANDATORY: the in-app updater verifies SHA256SUMS.asc against
      # the committed public key (fail-closed), so an unsigned release would be
      # uninstallable in-app. Fail early and loudly if the secret is missing.
      - name: Require a signing key
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ] || [ -z "$GPG_PASSPHRASE" ]; then
            echo "::error::GPG_PRIVATE_KEY / GPG_PASSPHRASE secrets are required — the in-app updater rejects unsigned releases. Add them in repo Settings → Secrets."
            exit 1
          fi

      # Need the committed public key (/KEYS) to self-check the signing key.
      # Checkout BEFORE download-artifact (checkout cleans the workspace).
      - name: Check out (for the pinned public key)
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.v }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Collect packages + checksums
        run: |
          mkdir -p out
          find dist -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.pkg.tar.*' \) \
            -exec cp -n {} out/ \;
          cd out
          sha256sum * > SHA256SUMS
          echo "----- SHA256SUMS -----"; cat SHA256SUMS

      - name: Import signing key
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      # Guard against the signing key drifting from the public key shipped to
      # clients: sign a probe and verify it against ONLY the committed /KEYS in a
      # throwaway keyring. If they diverge, every client update would break.
      - name: Verify signing key matches committed /KEYS
        run: |
          probe="$(mktemp)"; echo "speculum-signing-self-check" > "$probe"
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --detach-sign --armor -o "$probe.asc" "$probe"
          export GNUPGHOME="$(mktemp -d)"
          gpg --batch --import KEYS
          gpg --batch --verify "$probe.asc" "$probe" \
            || { echo "::error::Signing key does not match committed /KEYS — clients would reject updates. Update /KEYS or the GPG_PRIVATE_KEY secret."; exit 1; }

      - name: GPG-sign artifacts
        run: |
          cd out
          sign() { gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" --detach-sign --armor "$1"; }
          for f in *; do [ "$f" = SHA256SUMS ] || sign "$f"; done
          sign SHA256SUMS

      - name: Attach checksums + signatures to the Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.v }}
          files: |
            out/SHA256SUMS
            out/*.asc