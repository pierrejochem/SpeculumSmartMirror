name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # .deb + .rpm for both arches. Build the Compose app-image with jpackage
  # (`createDistributable`) — which can't cross-compile, so each arch runs on its
  # own native runner (free for public repos, no QEMU) — then wrap it with nfpm.
  # nfpm (not jpackage's installer) gives the /usr/bin symlink, the systemd unit
  # at /usr/lib/systemd, and the postinstall/postremove scripts.
  linux-deb-rpm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: arm64, runner: ubuntu-24.04-arm }
          - { arch: amd64, runner: ubuntu-latest }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: config-server/web/package-lock.json

      - name: Build web admin UI
        working-directory: config-server/web
        run: |
          npm ci
          npm run build

      # Build the self-contained app-image (launcher + bundled JRE + plugins +
      # web admin). createDistributable also runs prepareAppResources, which
      # bundles the module JARs and the web UI built above.
      - name: Build app-image (${{ matrix.arch }})
        run: |
          docker run --rm -v "$PWD":/src -w /src eclipse-temurin:17-jdk bash -c "
            ./gradlew :composeApp:createDistributable --no-daemon --stacktrace
          "

      # nfpm turns the one app-image into both a .deb and a .rpm, adding the
      # /usr/bin symlink, systemd unit and maintainer scripts (see
      # packaging/nfpm/nfpm.yaml). PKG_ARCH is the Debian arch; nfpm maps it to
      # the rpm arch automatically.
      - name: Install nfpm
        env:
          NFPM_VERSION: "2.43.0"
        run: |
          case "${{ matrix.arch }}" in
            arm64) NFPM_ARCH=arm64 ;;
            amd64) NFPM_ARCH=x86_64 ;;
          esac
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_${NFPM_ARCH}.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm

      - name: Package .deb + .rpm (${{ matrix.arch }})
        env:
          PKG_ARCH: ${{ matrix.arch }}
          PKG_VERSION: ${{ github.ref_name }}
        run: |
          export PKG_VERSION="${PKG_VERSION#v}"   # strip leading "v" from the tag
          nfpm pkg --config packaging/nfpm/nfpm.yaml --packager deb --target dist/
          nfpm pkg --config packaging/nfpm/nfpm.yaml --packager rpm --target dist/

      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: speculum-linux-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.rpm

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.deb
            dist/*.rpm
          generate_release_notes: true

  # Arch package for both arches (the PKGBUILD installs the app-image).
  arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: aarch64, runner: ubuntu-24.04-arm, image: "menci/archlinuxarm:base-devel" }
          - { arch: x86_64, runner: ubuntu-latest, image: "archlinux:base-devel" }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      # makepkg must run as a non-root user. pkgver is pinned to the triggering
      # tag so the PKGBUILD's source tarball matches.
      - name: Build Arch package (${{ matrix.arch }})
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            ${{ matrix.image }} bash -c '
              set -e
              # systemd-detect-virt is flaky in containers; stub it so pacman
              # hooks never abort the install.
              ln -sf /usr/bin/true /usr/bin/systemd-detect-virt
              # pacman 7 download sandbox (Landlock + the alpm user) cannot
              # initialize inside an unprivileged container, so disable it.
              sed -i "s/^\[options\]/[options]\nDisableSandbox/" /etc/pacman.conf
              pacman -Syu --noconfirm --needed base-devel sudo jdk17-openjdk nodejs npm git
              useradd -m builder
              printf "builder ALL=(ALL) NOPASSWD: ALL\n" > /etc/sudoers.d/builder
              chown -R builder /src
              sed -i "s/^pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" packaging/arch/PKGBUILD
              cd packaging/arch
              # -s installs the PKGBUILD depends/makedepends via pacman (builder
              # has passwordless sudo), so runtime libs resolve during the build.
              sudo -u builder makepkg -s -f --noconfirm
            '

      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: speculum-arch-${{ matrix.arch }}
          # makepkg's PKGEXT differs by distro (.zst vs .xz), so match any.
          path: packaging/arch/*.pkg.tar.*

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: packaging/arch/*.pkg.tar.*

  publish-mirror-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # GITHUB_REPOSITORY (owner/repo) and the GITHUB_TOKEN are provided by
      # Actions; the build reads them to target maven.pkg.github.com.
      - name: Publish mirror-api to GitHub Packages
        run: ./gradlew :mirror-api:publish -PreleaseVersion="${GITHUB_REF_NAME}" --no-daemon --stacktrace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  # SHA256SUMS over every package, plus detached GPG signatures when a signing
  # key is configured. Runs after the package jobs so all artifacts exist.
  checksums:
    needs: [linux-deb-rpm, arch]
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Collect packages + checksums
        run: |
          mkdir -p out
          find dist -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.pkg.tar.*' \) \
            -exec cp -n {} out/ \;
          cd out
          sha256sum * > SHA256SUMS
          echo "----- SHA256SUMS -----"; cat SHA256SUMS

      - name: GPG-sign artifacts (only if a key is configured)
        if: env.GPG_PRIVATE_KEY != ''
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          cd out
          sign() { gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" --detach-sign --armor "$1"; }
          for f in *; do [ "$f" = SHA256SUMS ] || sign "$f"; done
          sign SHA256SUMS

      - name: Attach checksums + signatures to the Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            out/SHA256SUMS
            out/*.asc