version: 2
updates:
  # Gradle dependencies (reads the version catalog in gradle/libs.versions.toml)
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      kotlin-compose:
        patterns: ["org.jetbrains.kotlin*", "org.jetbrains.compose*", "org.jetbrains.androidx*"]
      ktor:
        patterns: ["io.ktor*"]

  # React admin UI
  - package-ecosystem: npm
    directory: "/config-server/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      vite:
        patterns: ["vite", "@vitejs/*"]

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly